name: DevOps Pipeline - Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Code checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Python setup & test
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flask pytest

    - name: Run basic test
      run: |
        python -c "from app import app; print('App import OK')"

    # Step 3: Docker login
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 4: Docker build & push
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-flask-app:latest

    - name: Success Message
      run: echo "✅ Pipeline completed! Image pushed to Docker Hub."
